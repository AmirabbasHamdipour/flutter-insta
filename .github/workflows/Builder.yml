name: Flutter Android Build + Push APK to Repo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write          # اجازه push مستقیم به مخزن

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # تنظیم مسیر فایل لاگ
      - name: Set log file path
        run: echo "LOG_FILE=build_log.txt" >> $GITHUB_ENV

      # ایجاد فایل لاگ اولیه (همیشه اجرا می‌شود)
      - name: Initialize log file
        run: |
          echo "=== Flutter Build Log - $(date) ===" > ${{ env.LOG_FILE }}
          echo "Repository: $GITHUB_REPOSITORY" >> ${{ env.LOG_FILE }}
          echo "Branch: $GITHUB_REF" >> ${{ env.LOG_FILE }}
          echo "Workflow: $GITHUB_WORKFLOW" >> ${{ env.LOG_FILE }}
          echo "Run ID: $GITHUB_RUN_ID" >> ${{ env.LOG_FILE }}
          echo "===================================" >> ${{ env.LOG_FILE }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.14.0
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Check if Flutter project exists
        id: check_project
        run: |
          echo "Checking for pubspec.yaml..." | tee -a ${{ env.LOG_FILE }}
          if [ -f "pubspec.yaml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Project found." | tee -a ${{ env.LOG_FILE }}
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "❌ No pubspec.yaml found. Will create new project." | tee -a ${{ env.LOG_FILE }}
          fi

      - name: Create new Flutter project
        if: steps.check_project.outputs.exists == 'false'
        run: |
          echo "Creating Flutter project..." | tee -a ${{ env.LOG_FILE }}
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          PROJECT_NAME=$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/_/g' | sed 's/^[0-9]/_/')
          [ -z "$PROJECT_NAME" ] && PROJECT_NAME="my_flutter_app"
          flutter create --org com.example.app --project-name "$PROJECT_NAME" . 2>&1 | tee -a ${{ env.LOG_FILE }}

      - name: Commit and push new Flutter project
        if: steps.check_project.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "🚀 Initialize Flutter project via GitHub Actions"
          git push

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..." | tee -a ${{ env.LOG_FILE }}
          flutter pub get 2>&1 | tee -a ${{ env.LOG_FILE }}

      - name: Generate launcher icons (if configured)
        run: |
          if grep -q "flutter_launcher_icons" pubspec.yaml; then
            echo "🖼️ Generating launcher icons..." | tee -a ${{ env.LOG_FILE }}
            dart run flutter_launcher_icons 2>&1 | tee -a ${{ env.LOG_FILE }}
          else
            echo "ℹ️ flutter_launcher_icons not found, skipping." | tee -a ${{ env.LOG_FILE }}
          fi

      - name: Run build_runner (if configured)
        run: |
          if grep -q "build_runner" pubspec.yaml; then
            echo "🏗️ Running build_runner..." | tee -a ${{ env.LOG_FILE }}
            flutter pub run build_runner build --delete-conflicting-outputs 2>&1 | tee -a ${{ env.LOG_FILE }}
          else
            echo "ℹ️ build_runner not found, skipping." | tee -a ${{ env.LOG_FILE }}
          fi

      - name: Build Release APKs (split per ABI)
        run: |
          echo "🔨 Building APKs..." | tee -a ${{ env.LOG_FILE }}
          flutter build apk --release --split-per-abi 2>&1 | tee -a ${{ env.LOG_FILE }}

      - name: Prepare APK directory
        run: |
          mkdir -p apk
          rm -f apk/*.apk

      - name: Copy APKs to repository folder
        run: cp build/app/outputs/flutter-apk/*.apk apk/

      - name: Finalize log file
        run: |
          echo "===================================" >> ${{ env.LOG_FILE }}
          echo "Build completed at $(date)" >> ${{ env.LOG_FILE }}
          echo "Log file size: $(du -h ${{ env.LOG_FILE }} | cut -f1)" >> ${{ env.LOG_FILE }}

      # این مرحله همیشه اجرا می‌شود – حتی اگر مراحل قبلی با خطا مواجه شده باشند
      - name: Upload logs and APKs (always)
        if: always()
        run: |
          echo "📤 Attempting to push build log and APKs..."

          # بررسی وجود دایرکتوری .git (مطمئن شویم یک مخزن Git است)
          if [ ! -d ".git" ]; then
            echo "⚠️ Not a git repository. Cannot push logs." | tee -a ${{ env.LOG_FILE }}
            exit 0
          fi

          # بررسی وجود فایل لاگ
          if [ ! -f "${{ env.LOG_FILE }}" ]; then
            echo "⚠️ Log file not found. Creating an empty one." | tee -a ${{ env.LOG_FILE }}
            echo "Build failed before log file creation." > ${{ env.LOG_FILE }}
          fi

          # پیکربندی git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # اضافه کردن APKها (اگر موجود باشند)
          if ls apk/*.apk 1> /dev/null 2>&1; then
            git add -f apk/*.apk
          fi

          # اضافه کردن فایل لاگ
          git add -f ${{ env.LOG_FILE }}

          # تلاش برای کامیت و push – در صورت عدم تغییر، خطا نمی‌دهد
          git commit -m "📦 Update APK builds & build log [skip ci]" || echo "✅ No changes to commit"
          git push || echo "⚠️ Push failed (maybe no changes or network issue)"